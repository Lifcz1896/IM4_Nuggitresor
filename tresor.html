<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tresor</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="dashboard">
    <div class="app-container">

      <div class="card tresor-detail-header">
        <button class="icon-btn" onclick="window.location.href='dashboard.html'">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h1 id="tresorTitle" class="tresor-detail-title">…</h1>
        <button class="icon-btn" id="settingsBtn" title="Tagesziel anpassen">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>

      <div class="card status-card" id="statusCard">
        <div class="avatar avatar-xl" id="tresorEmoji">📫</div>
        <h2 id="statusTitle" class="status-title">Nuggi ist draußen</h2>
        <p id="statusSubtitle" class="status-subtitle">Lege den Nuggi in den Tresor</p>
      </div>

      <div class="card goal-detail-card">
        <div class="goal-detail-header">
          <span class="goal-detail-label">🎯 <strong>Heutiges Ziel</strong></span>
          <span id="goalNumbers" class="goal-detail-numbers">0.0h / –</span>
        </div>
        <div class="progress-bar" style="margin: 10px 0;">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="remaining-pill" id="remainingPill">⏱ Wird geladen…</div>
      </div>

      <button class="auth-secondary-btn verlauf-toggle-btn" id="verlaufBtn">
        📊 &nbsp;Verlauf ansehen
      </button>

      <div class="card verlauf-card hidden" id="verlaufCard">
        <h3 class="verlauf-title">Verlauf heute</h3>
        <div id="sessionList"></div>
      </div>

      <button class="auth-secondary-btn delete-tresor-btn" id="deleteBtn">
        🗑 &nbsp;<span style="color:#e74c3c">Tresor löschen</span>
      </button>

    </div>
    <script src="js/toast.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/tresor.js"></script>
  </body>
</html>
