<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wochenübersicht</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="dashboard">
    <div class="app-container">

      <div class="stats-page-header">
        <button class="icon-btn back-btn" onclick="window.location.href='dashboard.html'">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <h1 class="stats-title">📊 Wochenübersicht</h1>
        <div class="header-spacer"></div>
      </div>

      <div class="card stats-card">

        <div class="week-nav">
          <button id="prevWeekBtn" class="week-nav-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span id="weekRange" class="week-range">Wird geladen…</span>
          <button id="nextWeekBtn" class="week-nav-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>

        <div id="tresorStats">
          <p class="loading">Wird geladen…</p>
        </div>

      </div>
    </div>
    <script src="js/stats.js"></script>
  </body>
</html>
