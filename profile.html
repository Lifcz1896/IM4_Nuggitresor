<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profil</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="dashboard">
    <div class="app-container">
    <div class="stats-page-header">
      <button class="icon-btn back-btn" onclick="window.location.href='dashboard.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="stats-title">Profil</h1>
      <div class="header-spacer"></div>
    </div>

    <div class="card">
      <form id="profileForm" style="display:flex; flex-direction:column; gap:12px;">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="firstname" placeholder="Vorname" required />
        </div>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="lastname" placeholder="Nachname" required />
        </div>
        <button type="submit" class="btn-add-tresor" style="margin-top: 8px;">Speichern</button>
      </form>
    </div>

    </div>
    <script src="js/toast.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
