<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuggi-Tresor – Registrieren</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth">
    <div class="auth-container">

      <div class="hero-circle">✨</div>

      <h1 class="auth-title">Nuggi-Tresor</h1>
      <p class="auth-subtitle">• Neues Konto erstellen •</p>

      <form id="registerForm" class="auth-card">
        <div class="input-group">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="E-Mail" required />
        </div>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Passwort" required />
        </div>
        <button type="submit" class="btn-primary">Registrieren 🚀</button>
      </form>

      <div class="auth-divider"><span>oder</span></div>

      <a href="login.html" class="auth-secondary-btn">🏠 Bereits ein Konto? Einloggen</a>

    </div>
    <script src="js/toast.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
